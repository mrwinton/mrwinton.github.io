<li>
  {% if page.active == include.title %}
  <a id="nav-link-{{ include.title }}" class="active" href="{{ include.url }}">
    {{ include.title | capitalize }}
  </a>
  {% else %}
  <a id="nav-link-{{ include.title }}" href="{{ include.url }}">
    {{ include.title | capitalize }}
  </a>
  {% endif %}
</li>
