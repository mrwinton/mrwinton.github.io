---
layout: default
---

{% assign transformed_content = content
  | replace: '<p><img', '<p class="prose-media"><img'
  | replace: '<p><picture>', '<p class="prose-media"><picture>'
  | replace: '<p><span class="picture">', '<p class="prose-media"><span class="picture">' %}

<div class="article-layout">
  <div class="post-header">
    <h1>
      {{ page.title }}
    </h1>

    <p class="post-meta">
      {{ page.date | date: '%B %d, %Y' }}
    </p>
  </div>

  <div class="post-body prose">
    {{ transformed_content }}
  </div>
</div>
