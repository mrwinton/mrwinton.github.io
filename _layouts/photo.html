---
layout: default
---

<div class="photo-layout">
  <section>
    <span>
      {% picture {{ page.photo }} --alt {{ page.title}} %}
    </span>
  </section>

  {% if content != "" %}
  <div class="content-column">
    <div class="prose photo-caption">
      {{ content }}
    </div>
  </div>
  {% endif %}
</div>
