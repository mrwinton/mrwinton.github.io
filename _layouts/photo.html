---
layout: default
---

<div class="container">
  <div class="post-header">
    <h2>
      {{ page.title }}
    </h2>

    <p class="post-meta">
      {{ page.date | date: '%B %d, %Y' }}
    </p>
  </div>
</div>

<div class="photo-layout">
  <section>
    <span>
      {% picture {{ page.photo }} --alt {{ page.title}} %}
    </span>
  </section>
</div>

<div class="container">
  <div class="prose">
    {{ content }}
  </div>
</div>
