[tools]
ruby = "3.4"

[settings]
ruby.compile = false

[tasks.ruby-setup]
description = "Install Ruby dependencies if needed"
run = [
  "gem list -i bundler -v 2.4.10 >/dev/null || gem install bundler -v 2.4.10",
  "bundle check || bundle install",
]

[tasks.setup]
description = "Install Ruby dependencies"
depends = ["ruby-setup"]

[tasks.serve]
description = "Run the Jekyll development server"
depends = ["ruby-setup"]
run = "bundle exec jekyll serve"

[tasks.build]
description = "Build the static site"
depends = ["ruby-setup"]
run = "bundle exec jekyll build"
