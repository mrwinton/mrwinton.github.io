[tools]
node = "16"
ruby = "3.4"

[env]
_.path = ["./node_modules/.bin"]

[settings]
ruby.compile = false

[tasks.node-setup]
description = "Install Node dependencies if needed"
run = "test -d node_modules || npm install"

[tasks.ruby-setup]
description = "Install Ruby dependencies if needed"
run = [
  "gem list -i bundler -v 2.4.10 >/dev/null || gem install bundler -v 2.4.10",
  "bundle check || bundle install",
]

[tasks.setup]
description = "Install Ruby and Node dependencies"
depends = ["node-setup", "ruby-setup"]

[tasks.css]
description = "Build the PostCSS/Tailwind stylesheet"
depends = ["node-setup"]
run = "npm run postcss"

[tasks.css-watch]
description = "Watch and rebuild the PostCSS/Tailwind stylesheet"
run = "npm run dev"

[tasks.serve]
description = "Build CSS and run the Jekyll development server"
depends = ["css", "ruby-setup"]
run = "bundle exec jekyll serve"

[tasks.build]
description = "Build the static site"
depends = ["css", "ruby-setup"]
run = "bundle exec jekyll build"
