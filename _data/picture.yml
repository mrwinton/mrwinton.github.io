media_queries:
  mobile: 'max-width: 480px'
  tablet: 'max-width: 768px'
  laptop: 'max-width: 1024px'
  desktop: 'max-width: 1200px'
  wide: 'min-width: 1201px'

presets:
  default:
    formats: [webp, original] # Order matters
    widths: [200, 400, 800, 1200, 1600] # Image widths in px
    sizes:
      mobile: calc(100vw - 16px)
      tablet: 80vw
    size: 800px
    dimension_attributes: true # Remove reflow
    attributes:
      img: 'class="mx-auto"'

  lazy:
    markup: data_auto
    widths: [200, 400, 800, 1200, 1600] # Image widths in px
    sizes:
      mobile: calc(100vw - 16px)
      tablet: 80vw
    size: 800px
    noscript: true # add a fallback image inside a <noscript> tag
    attributes:
      parent: 'class="lazy mx-auto"'

  breakout:
    formats: [webp, original] # Order matters
    widths: [200, 400, 800, 1200, 1600] # Image widths in px
    sizes:
      mobile: calc(100vw - 16px)
      tablet: 80vw
    size: 800px
    dimension_attributes: true # Remove reflow
    attributes:
      picture: 'class="prose-media-picture"'
      img: 'class="mx-auto"'
